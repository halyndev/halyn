services:
  halyn:
    build: .
    container_name: halyn
    restart: unless-stopped
    ports:
      - "8935:8935"
    volumes:
      - halyn-data:/home/halyn/.halyn
      - ${SSH_KEY_PATH:-~/.ssh}:/home/halyn/.ssh:ro
    environment:
      - HALYN_API_KEY=${HALYN_API_KEY:-}
      - HALYN_LLM_PROVIDER=${HALYN_LLM_PROVIDER:-ollama}
      - HALYN_LLM_MODEL=${HALYN_LLM_MODEL:-}
      - HALYN_LOG_LEVEL=${HALYN_LOG_LEVEL:-INFO}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8935/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  halyn-data:
    driver: local

